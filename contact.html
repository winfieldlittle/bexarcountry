<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — BexarCountry.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rust:   #C8451A;
      --amber:  #E8840A;
      --sand:   #F5E6CE;
      --dark:   #0F0D0B;
      --mid:    #1E1A14;
      --muted:  #6B5F4E;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--sand);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 999;
    }

    .bg-scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .bg-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 120% 70% at 60% 0%, #3B1F08 0%, #0F0D0B 65%);
    }

    .hills {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
    }

    .hill-far {
      position: absolute;
      bottom: 30%;
      left: -5%;
      width: 110%;
      height: 50%;
      background: #161209;
      border-radius: 50% 60% 0 0 / 80% 80% 0 0;
    }

    .hill-mid {
      position: absolute;
      bottom: 18%;
      left: -10%;
      width: 70%;
      height: 60%;
      background: #1A1510;
      border-radius: 0 80% 0 0 / 0 60% 0 0;
    }

    .hill-mid2 {
      position: absolute;
      bottom: 18%;
      right: -10%;
      width: 65%;
      height: 55%;
      background: #191410;
      border-radius: 80% 0 0 0 / 60% 0 0 0;
    }

    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 20%;
      background: linear-gradient(to top, #0F0D0B, #1A1510);
    }

    .trail {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 50%;
      background: linear-gradient(to top, rgba(200,69,26,0.25) 0%, rgba(200,69,26,0.08) 60%, transparent 100%);
      clip-path: polygon(20% 100%, 80% 100%, 55% 0%, 45% 0%);
    }

    .sun {
      position: absolute;
      top: 6%;
      right: 18%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, #FF8C2A 0%, #C8451A 40%, transparent 70%);
      filter: blur(8px);
      opacity: 0.55;
      animation: pulse-sun 4s ease-in-out infinite alternate;
    }

    @keyframes pulse-sun {
      from { opacity: 0.45; transform: scale(1); }
      to   { opacity: 0.65; transform: scale(1.06); }
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid rgba(200,69,26,0.15);
      background: rgba(15,13,11,0.6);
      backdrop-filter: blur(12px);
    }

    .topbar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      color: var(--sand);
      text-decoration: none;
    }

    .topbar-logo span { color: var(--rust); }

    .topbar-tag {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 9rem 2rem 6rem;
      text-align: center;
    }

    .contact-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(200,69,26,0.2);
      border-radius: 4px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(8px);
      opacity: 0;
      animation: fade-up 0.9s 0.3s forwards ease-out;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.8rem;
      opacity: 0;
      animation: fade-up 0.8s 0.1s forwards ease-out;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: '—';
      margin: 0 0.6rem;
      opacity: 0.5;
    }

    .contact-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 0.05em;
      color: var(--sand);
      text-shadow: 0 4px 40px rgba(200,69,26,0.3);
      margin-bottom: 0.5rem;
    }

    .contact-card p {
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(245,230,206,0.55);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--rust), transparent);
      margin: 0 auto 2rem;
    }

    .field {
      text-align: left;
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      padding: 0.85rem 1.1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,69,26,0.25);
      border-radius: 2px;
      color: var(--sand);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .field input::placeholder { color: var(--muted); }
    .field input:focus {
      border-color: var(--rust);
      background: rgba(200,69,26,0.06);
    }

    .submit-btn {
      width: 100%;
      padding: 0.9rem 1.4rem;
      margin-top: 0.5rem;
      background: var(--rust);
      border: 1px solid var(--rust);
      border-radius: 2px;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .submit-btn:hover { background: var(--amber); border-color: var(--amber); }
    .submit-btn:active { transform: scale(0.98); }

    #thankyou {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      animation: fade-up 0.7s ease-out forwards;
    }

    #thankyou .ty-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(200,69,26,0.12);
      border: 1px solid rgba(200,69,26,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--amber);
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
    }

    #thankyou h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: var(--sand);
    }

    #thankyou p {
      font-size: 0.88rem;
      font-weight: 300;
      color: rgba(245,230,206,0.6);
      line-height: 1.6;
      margin-bottom: 0;
    }

    #thankyou .back-link {
      margin-top: 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rust);
      text-decoration: none;
      border-bottom: 1px solid rgba(200,69,26,0.3);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    #thankyou .back-link:hover { color: var(--amber); border-color: var(--amber); }

    #message {
      margin-top: 1.2rem;
      padding: 0.9rem 1rem;
      border-radius: 2px;
      font-size: 0.85rem;
      font-weight: 600;
      display: none;
      background: rgba(180,20,20,0.12);
      border: 1px solid rgba(180,20,20,0.4);
      color: #e07070;
    }

    #message.error { display: block; }

    .footer {
      position: fixed;
      bottom: 1.2rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 10;
      opacity: 0;
      animation: fade-in 1s 1s forwards ease-out;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 540px) {
      .topbar { padding: 1rem 1.4rem; }
      .contact-card { padding: 2rem 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="bg-scene">
    <div class="sun"></div>
    <div class="hills">
      <div class="hill-far"></div>
      <div class="hill-mid"></div>
      <div class="hill-mid2"></div>
      <div class="ground"></div>
      <div class="trail"></div>
    </div>
  </div>

  <header class="topbar">
    <a href="index.html" class="topbar-logo">Bexar<span>Country</span>.com</a>
    <div class="topbar-tag">San Antonio, TX</div>
  </header>

  <main class="page">
    <div class="eyebrow">Get in Touch</div>

    <div class="contact-card">
      <h2>Contact Us</h2>
      <p>Have a question, tip, or want to get involved? Drop us a line and we'll be in touch.</p>
      <div class="divider"></div>

      <form id="contactForm">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your Name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <div id="thankyou">
        <div class="ty-icon">✓</div>
        <h3>Thank You!</h3>
        <p>Your message has been received. We'll be in touch with you soon.</p>
        <a href="index.html" class="back-link">← Back to Home</a>
      </div>

      <div id="message"></div>
    </div>
  </main>

  <footer class="footer">© 2026 BexarCountry.com — San Antonio, Texas</footer>

  <script>
    const form = document.getElementById('contactForm');
    const messageDiv = document.getElementById('message');

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjEc0QogzwfYY2HUupEJZefTRUPn13Ne9qZ2zlN_f4UHXvssm6DdAJ4s4Dajvdingh/exec";

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      messageDiv.className = "";
      messageDiv.style.display = "none";
      messageDiv.textContent = "";

      const submitBtn = form.querySelector('.submit-btn');
      submitBtn.textContent = "Sending...";
      submitBtn.disabled = true;

      const formData = new FormData(form);

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData
        });

        const result = await response.text();

        if (result.includes("Success")) {
          form.style.display = "none";
          document.getElementById('thankyou').style.display = "flex";
        } else {
          messageDiv.className = "error";
          messageDiv.textContent = "❌ " + result;
        }
      } catch (err) {
        messageDiv.className = "error";
        messageDiv.textContent = "❌ Network error: " + err.message;
      } finally {
        submitBtn.textContent = "Send Message";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
