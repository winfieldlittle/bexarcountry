<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form → Google Sheets</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #4285f4; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #3367d6; }
        #message { margin-top: 20px; padding: 15px; border-radius: 4px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Contact Form</h2>
    
    <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required>

        <label for="email">Youyr Email:</label>
        <input type="email" id="email" name="email" placeholder="Your Email" required>

        <button type="submit">Submit & Save to Sheet</button>
    </form>

    <div id="message"></div>

    <script>
        const form = document.getElementById('contactForm');
        const messageDiv = document.getElementById('message');

        // ←←← UPDATE THIS URL with your latest deployed Web App URL ←←←
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjEc0QogzwfYY2HUupEJZefTRUPn13Ne9qZ2zlN_f4UHXvssm6DdAJ4s4Dajvdingh/exec";

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            messageDiv.textContent = "Submitting...";
            messageDiv.className = "";

            const formData = new FormData(form);

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.text();

                if (result.includes("Success")) {
                    messageDiv.className = "success";
                    messageDiv.textContent = "✅ Success! Contact saved to Google Sheets.";
                    form.reset();   // Clear the form
                } else {
                    messageDiv.className = "error";
                    messageDiv.textContent = "❌ " + result;
                }
            } catch (err) {
                messageDiv.className = "error";
                messageDiv.textContent = "❌ Network error: " + err.message;
            }
        });
    </script>
</body>
</html>
